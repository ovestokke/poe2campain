name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            ext: ""
          - goos: windows
            goarch: amd64
            archive: zip
            ext: ".exe"
          - goos: windows
            goarch: arm64
            archive: zip
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BIN_EXT: ${{ matrix.ext }}
          ARCHIVE_KIND: ${{ matrix.archive }}
        run: |
          set -euxo pipefail

          app="poe2campain"
          versioned_dir="$app-$GOOS-$GOARCH"
          bin_name="$app$BIN_EXT"
          out_dir="dist/$versioned_dir"
          mkdir -p "$out_dir"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -ldflags='-s -w' -trimpath -o "$out_dir/$bin_name" ./cmd/poe2campain

          cp -R data "$out_dir/data"

          mkdir -p release
          if [ "$ARCHIVE_KIND" = "zip" ]; then
            (
              cd dist
              zip -r "../release/$versioned_dir.zip" "$versioned_dir"
            )
          else
            tar -C dist -czf "release/$versioned_dir.tar.gz" "$versioned_dir"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*
          if-no-files-found: error

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Generate checksums
        run: |
          set -euxo pipefail
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
